<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ProjectShopLLC</title>

    <link rel="stylesheet" href="styles.css">
    <script src="index.js" defer></script>
</head>
<body>
    <header>
        <h1>ProjectShopLLC</h1>
        <div class="nav">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </div>
    </header>
    <main>
        <section id="home">
            <div>
                <h1>Welcome to ProjectShopLLC</h1>
                <p>Serving the valley for over 20 years.</p>
                <a href="#contact">Get in touch</a>
            </div>
            <img src="#" alt="">
        </section>
        <section id="#about">
            <img src="#" alt="">
            <div>
                <h2>Our Story</h2>
                <p>This is how we became who we are today.</p>
            </div>
        </section>
        <section id="contact">
            <div class="contaict-container">
                <h2>Contact Us</h2>
                <form class="contact-form">
                    <div class="name prompt">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="business-name prompt">
                        <label for="business-name">Business-Name</label>
                        <input type="text" id="business-name" name="business-name" required>
                    </div>
                    <div class="email prompt">
                        <label for="email">Email</label>
                        <input type="text" id="email" name="email" required>
                    </div>
                    <div class="phone prompt">
                        <label for="phone">Name</label>
                        <input type="text" id="phone" name="phone" required>
                    </div>
                    <div class="preference prompt">


                        <label>Contact Preference</label>
                        <div class="radios">
                            <label for="email-preference">
                                <input type="radio" name="contact-preference" id="email-preference" value="email" required>
                                Email
                            </label>
                            <label for="phone-preference">
                                <input type="radio" name="contact-preference" id="phone-preference" value="Phone" required>
                                Phone
                            </label>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <h3>Footer</h3>
    </footer>
</body>

</html>
